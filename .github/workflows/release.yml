name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish
        run: dotnet publish gccphat.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o publish
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/gccphat.exe
          generate_release_notes: true
